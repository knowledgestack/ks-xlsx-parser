name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      - name: Ruff lint
        run: |
          pip install ruff
          ruff check src/ tests/ scripts/ || true  # non-blocking until cleanup PR lands

      - name: Run test suite
        run: make test-ci

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}-py${{ matrix.python-version }}
          path: reports/junit.xml
          if-no-files-found: ignore

  testbench:
    name: testBench round-trip (ubuntu / py3.12)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      - name: Build generated testBench
        run: make testbench-build

      - name: Run round-trip tests
        run: make testbench

      - name: Upload failure log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testbench-failures
          path: metrics/testbench/failures.json
          if-no-files-found: ignore
