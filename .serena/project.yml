# Architecture context injected when project is activated.
# Summarizes the system for LLM-assisted development.
initial_prompt: |
  # XLSXParser — Architecture Context

  ## System Overview
  Production enterprise-focused auditable Excel parser. Parses all .xlsx files using BOTH traditional (deterministic) and LLM approaches to maximize accuracy. **Must not miss any data** in the Excel file.

  ## Pipeline
  Load → Parse → Normalize → Segment → Render → Store
  - **Load**: File/bytes, content hash (xxhash64), openpyxl + direct OOXML parsing
  - **Parse**: Cells, formulas, merges, tables, charts, images, comments, conditional formatting
  - **Normalize**: Merged cells, bounding boxes, used range, formula dependency graph
  - **Segment**: Logical blocks (tables, headers, text, chart anchors) via heuristics
  - **Render**: HTML + plain text per block, token counts for RAG
  - **Store**: JSON export, Postgres mapping, vector store entries

  ## Output & Access
  - Data is chunked for RAG retrieval
  - Primary user access: export as JSON (`ParseResult.to_json()`)
  - Deterministic chunk IDs and hashes for auditability
  - Every element traceable to sheet coordinates + workbook hash

  ## Operational Model
  - **Temporal integration**: Runs in Temporal workflows with multiple asynchronous Excel files processed in parallel
  - **Testing & validation**: Stage verification (Excellent Algorithm), validation loops, correctness assertions
  - **LLM skills per stage**: Each pipeline stage has its own detailed LLM skill/prompt for that task (load, parse, normalize, segment, render, store, validate)
  - **Final deliverable**: Consolidated document for user validation

  ## Key Directories
  - src/xlsx_parser/: core library
  - pipeline.py: main orchestration (parse_workbook)
  - parsers/: workbook, sheet, cell, table extraction
  - chunking/: segmenter, chunker
  - rendering/: HTML, text
  - verification/: stage_verifier (Excellent Algorithm mapping)
  - storage/: serializer, JSON export

  ## Principles
  - Deterministic: identical input → identical output
  - Loss-minimizing: extract maximum data even from malformed workbooks
  - Thread-safe: sheet-level parsing parallelizable
  - Auditable: full traceability via hashes and coordinates
